packages:
  - "."
  - "examples/*"
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.24
  vite-plus: latest
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
