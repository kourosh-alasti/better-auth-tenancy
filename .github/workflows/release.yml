name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (uses the current package.json version when "none")
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
      dry_run:
        description: Validate the release without publishing to npm
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm fmt
      - run: pnpm test
      - run: pnpm check

      - name: Configure git
        if: inputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: inputs.bump != 'none'
        run: 'npm version ${{ inputs.bump }} -m "release: v%s"'

      - run: pnpm build

      - name: Push release commit and tag
        if: inputs.bump != 'none' && !inputs.dry_run
        run: git push origin HEAD:main --follow-tags

      - name: Publish to npm
        if: !inputs.dry_run
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: inputs.dry_run
        run: pnpm publish --dry-run --no-git-checks --access public
